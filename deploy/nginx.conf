# 彩票速查 — Nginx 站点配置
# 放到 ECS:/etc/nginx/conf.d/lottery.conf
# 把 your.domain.com 改成你的域名;证书路径见 docs/DEPLOY.md

# HTTP:统一跳转到 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name your.domain.com;

    # 申请 Let's Encrypt 证书时,certbot 需要这个目录做校验
    location /.well-known/acme-challenge/ {
        root /var/www/lottery;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS:正式服务
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name your.domain.com;

    # —— 证书 ——(certbot 会自动改写;若用阿里云下载的证书,填下面两行路径)
    ssl_certificate     /etc/nginx/ssl/lottery.crt;
    ssl_certificate_key /etc/nginx/ssl/lottery.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    root  /var/www/lottery;
    index index.html;

    # 单页应用:任何路径都回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 带内容 hash 的静态资源 → 长缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 入口 HTML 不缓存,保证发版后立即生效
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip            on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types      text/css application/javascript application/json image/svg+xml;
}
